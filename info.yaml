# Tiny Tapeout project configuration for SPI Slave
project:
  title:        "tt_um_spi_slave"
  author:       "daniel"
  discord:      ""
  description:  "SPI Slave interface (CPOL/CPHA configurable, modes 0-3)"
  language:     "SystemVerilog"
  clock_hz:     50000000  # System clock frequency (internal, not SPI clock)
  tiles:        "1x1"
  top_module:   "tt_um_spi_slave"
  
  # Source files - must be in ./src directory
  source_files:
    - "spi_slave.sv"

# Pin mapping for Tiny Tapeout
# 8 inputs (ui), 8 outputs (uo), 8 bidirectional (uio)
pinout:
  # ===== INPUTS (ui[0..7]) =====
  # SPI Interface signals
  ui[0]: "sck"          # SPI Clock from master
  ui[1]: "cs_n"         # Chip Select (active low)
  ui[2]: "mosi"         # Master Out Slave In
  
  # TX data (8 bits to transmit - load when cs_n goes low)
  ui[3]: "tx_data[0]"
  ui[4]: "tx_data[1]"
  ui[5]: "tx_data[2]"
  ui[6]: "tx_data[3]"
  ui[7]: "tx_data[4]"
  
  # ===== OUTPUTS (uo[0..7]) =====
  # SPI output & RX data (8 bits received)
  uo[0]: "miso"         # Master In Slave Out (serial output)
  uo[1]: "rx_valid"     # Pulse when byte received (1 cycle)
  uo[2]: "rx_data[0]"   # Received data bit 0
  uo[3]: "rx_data[1]"   # Received data bit 1
  uo[4]: "rx_data[2]"   # Received data bit 2
  uo[5]: "rx_data[3]"   # Received data bit 3
  uo[6]: "rx_data[4]"   # Received data bit 4
  uo[7]: "rx_data[5]"   # Received data bit 5
  
  # ===== BIDIRECTIONAL (uio[0..7]) =====
  # TX data upper bits + RX data upper bits
  uio[0]: "tx_data[5]"  # TX data bit 5
  uio[1]: "tx_data[6]"  # TX data bit 6
  uio[2]: "tx_data[7]"  # TX data bit 7
  uio[3]: "rx_data[6]"  # RX data bit 6
  uio[4]: "rx_data[7]"  # RX data bit 7
  uio[5]: ""            # Unused
  uio[6]: ""            # Unused
  uio[7]: ""            # Unused

yaml_version: 6
